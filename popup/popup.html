<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 300px; margin: 0; font-family: system-ui, sans-serif; background: #0A131F; color: #F4EFE3; padding: 18px; }
    h1 { font-size: 14px; margin: 0 0 8px; letter-spacing: .02em; }
    #intro { font-size: 12px; color: #A9A697; line-height: 1.5; margin: 0 0 14px; }
    #s2status { font-size: 12px; color: #A9A697; line-height: 1.5; margin: 10px 0 0; }
    #s2status .ok { color: #7FB791; }
    button { width: 100%; padding: 10px; border: 0; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; }
    button:disabled { opacity: .6; cursor: default; }
    .connect { background: #53FC18; color: #0A131F; }
    #rates { margin-top: 14px; border-top: 1px solid rgba(201,167,102,.18); padding-top: 12px; }
    .rates-h { font-family: ui-monospace, monospace; font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: #C9A766; margin-bottom: 8px; }
    .rates-intro { font-size: 12px; color: #A9A697; line-height: 1.5; margin-bottom: 12px; }
    .rates-item { margin: 12px 0; }
    .rates-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
    .rates-l { font-size: 13px; color: #F4EFE3; font-weight: 600; }
    .rates-amt { font-size: 12px; color: #53FC18; font-variant-numeric: tabular-nums; flex: none; }
    .rates-desc { font-size: 11px; color: #A9A697; line-height: 1.45; margin-top: 3px; }
    .rates-sub { font-size: 11px; color: #8A8678; line-height: 1.45; margin-top: 3px; padding-left: 10px; border-left: 1px solid rgba(201,167,102,.2); }
    .rates-note { font-size: 11px; color: #8A8678; line-height: 1.5; margin-top: 14px; padding-top: 10px; border-top: 1px solid rgba(201,167,102,.12); }
    #update { display: none; font-size: 12px; line-height: 1.45; margin: 0 0 12px; padding: 9px 11px; border-radius: 8px; background: rgba(232,179,57,.12); border: 1px solid rgba(232,179,57,.45); color: #E8B339; }
    #ver { font-size: 10px; color: #6B6960; font-family: ui-monospace, monospace; margin-top: 14px; text-align: right; }
  </style>
</head>
<body>
  <h1>Rinaudo Capital</h1>
  <div id="update"></div>
  <p id="intro">Connect with Kick to earn tickets for liking &amp; commenting on posts. You'll also get pinged when Mizkif goes live or posts.</p>
  <button id="s2connect" class="connect">Connect with Kick</button>
  <p id="s2status">…</p>
  <div id="rates"></div>
  <p id="ver"></p>
  <script src="../rates-list.js"></script>
  <script src="popup.js"></script>
</body>
</html>
