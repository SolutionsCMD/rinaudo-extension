<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Vote — Rinaudo Capital</title>
  <style>
    html, body { margin: 0; height: 100%; }
    body { background: #0A131F; color: #F4EFE3; font-family: system-ui, sans-serif; padding: 18px; box-sizing: border-box; }
    .q { font-size: 15px; font-weight: 600; margin: 0 0 14px; line-height: 1.35; }
    button.opt { display: block; width: 100%; margin: 7px 0; padding: 12px; border: 0; border-radius: 9px;
      background: #1d2c44; color: #F4EFE3; cursor: pointer; font-size: 14px; text-align: left; }
    button.opt:hover:not(:disabled) { background: #2a3d5c; }
    button.opt:disabled { opacity: .55; cursor: default; }
    button.opt.chosen { background: #244a33; color: #86D6A4; }
    .voted { color: #7FB791; font-size: 13px; margin-top: 10px; }
    .muted { color: #A9A697; font-size: 13px; }
  </style>
</head>
<body>
  <div id="root"><p class="muted">Loading poll…</p></div>
  <script src="../config.js"></script>
  <script src="vote.js"></script>
</body>
</html>
